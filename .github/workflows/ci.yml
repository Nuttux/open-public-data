name: CI

# Gate CI complet pour PRs vers `main` et `test`, et pushes sur ces branches.
#
# Architecture :
#   - build      : lint + typecheck + Vitest + next build (avec artefact .next)
#   - e2e        : Playwright sur build artefact (golden path 6 routes)
#   - lighthouse : audit perf/a11y/SEO sur build artefact (gates : perf ≥ 80, a11y ≥ 95)
#   - pipeline   : Python syntax check
#
# Les jobs e2e + lighthouse partagent le .next via artifact pour éviter
# de rebuild 3 fois (économie ~6 min wall-time).

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main, test]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (lint + typecheck + Vitest + next build)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Remove .next/cache (not needed downstream)
        run: rm -rf .next/cache

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: website/.next
          retention-days: 1
          if-no-files-found: error
          # .next starts with a dot → upload-artifact v4 treats it as hidden
          # and refuses to upload unless we opt in explicitly.
          include-hidden-files: true

  e2e:
    name: E2E (Playwright golden path)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download .next artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: website/.next

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('website/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start Next.js server
        run: npm run start &
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 -t 60000

      - name: Run Playwright
        run: PLAYWRIGHT_BASE_URL=http://localhost:3000 npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse (perf + a11y gates)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download .next artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: website/.next

      - name: Start Next.js server
        run: npm run start &
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 -t 60000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/methode
            http://localhost:3000/ville/paris/budget
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./website/.lighthouserc.json

  pipeline-python:
    name: Pipeline (Python syntax)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: python -m compileall -q pipeline/scripts/
