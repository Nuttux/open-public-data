name: CI

# Gate CI complet pour PRs vers `main` et `test`, et pushes sur ces branches.
#
# Architecture :
#   - build      : lint + typecheck + Vitest + next build (avec artefact .next)
#   - e2e        : Playwright sur build artefact (golden path 6 routes)
#   - lighthouse : audit perf/a11y/SEO sur build artefact (gates : perf ≥ 80, a11y ≥ 95)
#   - pipeline   : Python syntax check
#
# Les jobs e2e + lighthouse partagent le .next via artifact pour éviter
# de rebuild 3 fois (économie ~6 min wall-time).

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main, test]
  workflow_dispatch:  # permet de lancer manuellement E2E/Lighthouse sur n'importe quelle branche

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (lint + typecheck + Vitest + next build)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Remove .next/cache (not needed downstream)
        run: rm -rf .next/cache

      # Tar .next before upload: Next.js emits chunk files containing `:`
      # (e.g. `[externals]_node:crypto_*.js`) which actions/upload-artifact
      # rejects. Wrapping in a tarball preserves filenames intact.
      - name: Package .next as tarball
        run: tar -cf next-build.tar .next

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: website/next-build.tar
          retention-days: 1
          if-no-files-found: error

  e2e:
    name: E2E (Playwright golden path)
    needs: build
    # Ne tourne que sur push main (pas sur chaque PR) pour économiser les
    # minutes Actions sur repos privés. Si besoin de tester E2E sur une
    # PR spécifique, lancer manuellement via workflow_dispatch.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download .next artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: website

      - name: Extract .next tarball
        run: tar -xf next-build.tar && rm next-build.tar

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('website/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start Next.js server
        run: npm run start &
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 -t 60000

      - name: Run Playwright
        run: PLAYWRIGHT_BASE_URL=http://localhost:3000 npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse ${{ matrix.profile }}
    needs: build
    # Ne tourne que sur push main pour économiser les minutes Actions
    # (Lighthouse desktop + mobile = ~15-20 min cumulées). Pas critique
    # de l'avoir sur chaque PR : on peut lancer manuellement si on
    # touche à un truc perf-sensible.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        profile: [desktop, mobile]
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download .next artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: website

      - name: Extract .next tarball
        run: tar -xf next-build.tar && rm next-build.tar

      - name: Start Next.js server
        run: npm run start &
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3000 -t 60000

      - name: Run Lighthouse CI (${{ matrix.profile }})
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/methode
            http://localhost:3000/ville/paris/budget
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./website/.lighthouserc${{ matrix.profile == 'mobile' && '.mobile' || '' }}.json

  pipeline-python:
    name: Pipeline (Python syntax)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: python -m compileall -q pipeline/scripts/
