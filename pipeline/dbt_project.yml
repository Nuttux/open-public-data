# =============================================================================
# Projet dbt : Paris Public Open Data
# 
# Ce projet transforme les données brutes du budget de Paris (BigQuery)
# en tables analytiques prêtes pour la visualisation.
# =============================================================================

name: 'paris_public_open_data'
version: '1.0.0'
config-version: 2

# Répertoire racine du projet
profile: 'paris_open_data'

# Chemins des fichiers dbt
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Cible des fichiers compilés
clean-targets:
  - "target"
  - "dbt_packages"

# =============================================================================
# Configuration des seeds (référentiels et caches d'enrichissement)
#
# Types de seeds:
# - seed_mapping_*: Mappings statiques (manuels)
# - seed_cache_*: Caches d'enrichissement (peuplés par scripts Python)
# =============================================================================
seeds:
  paris_public_open_data:
    +schema: seeds

    # -------------------------------------------------------------------------
    # Nomenclature comptable par nature (M14/M57) — Block 1 budget national.
    # Pin types: "60"/"10" must stay STRING (they are compte prefixes, not ints).
    # -------------------------------------------------------------------------
    seed_nomenclature_comptes:
      +column_types:
        nature_prefix: string
        classe: string
        is_ordre: boolean

    # -------------------------------------------------------------------------
    # Mapping thématiques (chapitre/fonction → thématique dashboard)
    # -------------------------------------------------------------------------
    seed_mapping_thematiques:
      +column_types:
        chapitre_code: STRING
        fonction_prefix: STRING
        thematique: STRING
    
    # -------------------------------------------------------------------------
    # Mapping directions (direction → thématique)
    # -------------------------------------------------------------------------
    seed_mapping_directions:
      +column_types:
        direction: STRING
        thematique: STRING
        libelle_complet: STRING
    
    # -------------------------------------------------------------------------
    # Mapping bénéficiaires (pattern regex → thématique pour drill-down Sankey)
    # -------------------------------------------------------------------------
    seed_mapping_beneficiaires:
      +column_types:
        pattern: STRING
        thematique: STRING
        sous_categorie: STRING
        priorite: INT64
    
    # -------------------------------------------------------------------------
    # Lieux connus (géolocalisation manuelle des équipements parisiens)
    # -------------------------------------------------------------------------
    seed_lieux_connus:
      +column_types:
        pattern_match: STRING
        nom_complet: STRING
        adresse: STRING
        arrondissement: INT64
        latitude: FLOAT64
        longitude: FLOAT64
    
    # -------------------------------------------------------------------------
    # Match Projet d'investissement → Marché public (peuplé par
    # pipeline/scripts/enrich/match_projet_marches.py + score_projet_marches.py)
    # -------------------------------------------------------------------------
    seed_match_projet_marches:
      +column_types:
        projet_id: STRING
        projet_year: INT64
        projet_nom: STRING
        projet_montant: FLOAT64
        projet_arr: INT64
        numero_marche: STRING
        fournisseur_nom: STRING
        fournisseur_siret: STRING
        marche_objet: STRING
        marche_annee: INT64
        marche_montant: FLOAT64
        score: FLOAT64
        label: STRING
        reason: STRING

    # -------------------------------------------------------------------------
    # Cache AP → Géoloc (peuplé par enrich_geo_ap_llm.py)
    # -------------------------------------------------------------------------
    seed_cache_geo_ap:
      +column_types:
        ap_code: STRING
        ode_arrondissement: INT64
        ode_adresse: STRING
        ode_nom_lieu: STRING
        ode_latitude: FLOAT64
        ode_longitude: FLOAT64
        ode_confiance: FLOAT64
        ode_date_recherche: STRING
        ode_source: STRING
    
    # -------------------------------------------------------------------------
    # Cache Bénéficiaire → Thématique (peuplé par enrich_thematique_llm.py)
    # -------------------------------------------------------------------------
    seed_cache_thematique_beneficiaires:
      +column_types:
        beneficiaire_normalise: STRING
        ode_thematique: STRING
        ode_sous_categorie: STRING
        ode_confiance: FLOAT64
        ode_date_recherche: STRING
        ode_source: STRING
    
    # -------------------------------------------------------------------------
    # Budget Voté (BP) extrait des PDFs éditique BG (2020-2026)
    # Peuplé par: extract_pdf_budget_vote.py (pdfplumber)
    # Un fichier par année: seed_pdf_budget_vote_{YYYY}.csv
    # -------------------------------------------------------------------------
    seed_pdf_budget_vote_2020:
      +column_types:
        annee: INT64
        section: STRING
        sens_flux: STRING
        chapitre_code: STRING
        chapitre_libelle: STRING
        nature_code: STRING
        nature_libelle: STRING
        fonction_code: STRING
        montant: FLOAT64
        source_page: INT64
        source_pdf: STRING
    seed_pdf_budget_vote_2021:
      +column_types:
        annee: INT64
        section: STRING
        sens_flux: STRING
        chapitre_code: STRING
        chapitre_libelle: STRING
        nature_code: STRING
        nature_libelle: STRING
        fonction_code: STRING
        montant: FLOAT64
        source_page: INT64
        source_pdf: STRING
    seed_pdf_budget_vote_2022:
      +column_types:
        annee: INT64
        section: STRING
        sens_flux: STRING
        chapitre_code: STRING
        chapitre_libelle: STRING
        nature_code: STRING
        nature_libelle: STRING
        fonction_code: STRING
        montant: FLOAT64
        source_page: INT64
        source_pdf: STRING
    seed_pdf_budget_vote_2023:
      +column_types:
        annee: INT64
        section: STRING
        sens_flux: STRING
        chapitre_code: STRING
        chapitre_libelle: STRING
        nature_code: STRING
        nature_libelle: STRING
        fonction_code: STRING
        montant: FLOAT64
        source_page: INT64
        source_pdf: STRING
    seed_pdf_budget_vote_2024:
      +column_types:
        annee: INT64
        section: STRING
        sens_flux: STRING
        chapitre_code: STRING
        chapitre_libelle: STRING
        nature_code: STRING
        nature_libelle: STRING
        fonction_code: STRING
        montant: FLOAT64
        source_page: INT64
        source_pdf: STRING
    seed_pdf_budget_vote_2025:
      +column_types:
        annee: INT64
        section: STRING
        sens_flux: STRING
        chapitre_code: STRING
        chapitre_libelle: STRING
        nature_code: STRING
        nature_libelle: STRING
        fonction_code: STRING
        montant: FLOAT64
        source_page: INT64
        source_pdf: STRING
    seed_pdf_budget_vote_2026:
      +column_types:
        annee: INT64
        section: STRING
        sens_flux: STRING
        chapitre_code: STRING
        chapitre_libelle: STRING
        nature_code: STRING
        nature_libelle: STRING
        fonction_code: STRING
        montant: FLOAT64
        source_page: INT64
        source_pdf: STRING

    seed_pdf_investissements_2022:
      +column_types:
        id: STRING
        annee: INT64
        arrondissement: INT64
        chapitre_code: STRING
        chapitre_libelle: STRING
        nom_projet: STRING
        montant: FLOAT64
        type_ap: STRING
        confidence: FLOAT64
        source_page: INT64
        source_pdf: STRING
        date_extraction: STRING

    # -------------------------------------------------------------------------
    # Methodology / référentiels (source unique de vérité pour le frontend)
    # -------------------------------------------------------------------------
    seed_city_constants:
      +column_types:
        key: STRING
        value: STRING  # keep flexible: ints, floats and nb_arrondissements mixed
        unit: STRING
        source: STRING
        source_url: STRING
        date_reference: STRING
        notes: STRING
    seed_legal_thresholds:
      +column_types:
        key: STRING
        value: STRING
        unit: STRING
        source: STRING
        source_url: STRING
        date_reference: STRING
        notes: STRING
    seed_editorial_params:
      +column_types:
        key: STRING
        value: STRING
        unit: STRING
        rationale: STRING
        date_reference: STRING

    # -------------------------------------------------------------------------
    # DRIHL — demandes et attributions logement social (annuel)
    # -------------------------------------------------------------------------
    seed_drihl_paris_2024:
      +column_types:
        code_insee: STRING
        nom: STRING
        niveau_geo: STRING
        annee: INT64
        demandes_choix1: INT64
        attributions: INT64
        ratio_dem_attrib: FLOAT64
        delai_median_attribution_mois: FLOAT64
        part_anciennete_5ans_plus: FLOAT64
        source: STRING
        source_url: STRING

    seed_apur_sru_2001_2019:
      +column_types:
        arrondissement: INT64
        label: STRING
        annee: INT64
        logements_sociaux: INT64
        residences_principales: INT64
        source: STRING
        source_url: STRING
        licence: STRING

# =============================================================================
# Configuration des modèles par couche
# =============================================================================
models:
  paris_public_open_data:
    # -------------------------------------------------------------------------
    # Staging : Vues de nettoyage et typage
    # -------------------------------------------------------------------------
    staging:
      +materialized: view
      +schema: staging
      +tags: ['staging']
      +meta:
        owner: "danielshavit92@gmail.com"
        cadence: "on-demand (sync run cadence)"
        cost_bucket: "low"  # views, no storage
      # ADR-0012: enriched (LLM/curated) → private dataset via generate_schema_name.
      stg_cache_geo_ap: { +meta: { data_class: enriched } }
      stg_cache_thematique_beneficiaires: { +meta: { data_class: enriched } }
      stg_deliberations_articles: { +meta: { data_class: enriched } }
      stg_deliberations_delibs: { +meta: { data_class: enriched } }
      stg_deliberations_sessions: { +meta: { data_class: enriched } }
      stg_enrichment_caches: { +meta: { data_class: enriched } }
      stg_lieux_connus: { +meta: { data_class: enriched } }
      stg_pdf_investissements_localises: { +meta: { data_class: enriched } }
      stg_match_projet_marches: { +meta: { data_class: enriched } }

    # -------------------------------------------------------------------------
    # Intermediate : Tables intermédiaires avec logique métier
    # -------------------------------------------------------------------------
    intermediate:
      +materialized: table
      +schema: intermediate
      +tags: ['intermediate']
      +meta:
        owner: "danielshavit92@gmail.com"
        cadence: "after stg refresh"
        cost_bucket: "medium"

    # -------------------------------------------------------------------------
    # Core / Analytics : Tables finales dénormalisées (OBT)
    # -------------------------------------------------------------------------
    core:
      +materialized: table
      +schema: analytics
      +tags: ['analytics', 'core']
      +meta:
        owner: "danielshavit92@gmail.com"
        cadence: "after stg refresh"
        cost_bucket: "medium"
      # ADR-0012: enriched → private dataset. (deliberations = LLM/websearch
      # extraction end-to-end, private incl. amount_eur; cf. data-classification.md)
      core_enrichment_caches: { +meta: { data_class: enriched } }
      core_pdf_investissements_localises: { +meta: { data_class: enriched } }
      core_deliberations: { +meta: { data_class: enriched } }

    # -------------------------------------------------------------------------
    # Marts : Tables agrégées et optimisées pour l'export frontend
    # -------------------------------------------------------------------------
    marts:
      +materialized: table
      +schema: marts
      +tags: ['marts']
      +meta:
        owner: "danielshavit92@gmail.com"
        cadence: "before each export run"
        cost_bucket: "low-medium"
      # ADR-0012: enriched → private dataset. MIXED marts (subventions/geo/match
      # thematique) are NOT tagged yet — they need column-splitting, not blanket
      # privatisation (cf. docs/data-classification.md). Budget thematique stays
      # public (deterministic seed mapping).
      mart_enrichment_caches: { +meta: { data_class: enriched } }
      mart_investissements_localises: { +meta: { data_class: enriched } }
      mart_deliberations: { +meta: { data_class: enriched } }

    # -------------------------------------------------------------------------
    # National models (DGFiP balances, OFGL, DECP nat., etc.).
    # Folder default is DISABLED; individual budget models opt IN via
    # `config(enabled=true)` (Block 1: budget-by-nature for all communes).
    # Schemas co-located with the Paris families so national marts sit in the
    # same *_marts dataset the exporters read.
    # -------------------------------------------------------------------------
    national:
      +enabled: false
      staging:
        +schema: staging
      core:
        +schema: analytics
      marts:
        +schema: marts

# =============================================================================
# Configuration des snapshots — reproductibilité des chiffres publiés
#
# Cible : dataset BigQuery `dbt_paris_snapshots` (créé au premier run).
# Chaque snapshot suit les colonnes business d'une source raw et stocke
# les versions historiques via les colonnes dbt_valid_from / dbt_valid_to.
#
# À quoi ça sert :
#   - Un journaliste cite "412 M€ versés à CASVP en 2024" en mars
#   - En juin la Ville republie l'annexe avec corrections
#   - On peut reconstituer ce que le chiffre disait en mars
#
# Run manuel : `dbt snapshot --target prod`
# Run automatique : workflow .github/workflows/snapshots.yml (hebdomadaire)
#
# Couverture actuelle : 6 sources ID-keyed (subventions assoc., marchés
# Paris + DECP, logements sociaux, AP projets, investissements PDF).
# Sources sans clé stable (budget line items) → BQ table snapshots (TODO,
# cf docs/runbooks/snapshots.md).
# =============================================================================
snapshots:
  paris_public_open_data:
    +target_schema: dbt_paris_snapshots
    +file_format: bigquery

# =============================================================================
# Variables globales du projet
# =============================================================================
vars:
  # Année de début pour les données M57 (nouvelle norme comptable)
  annee_debut_m57: 2019
  
  # Filtre par défaut pour les opérations réelles
  type_operation_reel: ['Réel', 'R']
  
  # Activation des caches d'enrichissement (mettre à true après enrichissement)
  use_llm_cache_ap: false       # Cache LLM pour géoloc AP
  use_llm_cache_theme: false    # Cache LLM pour thématiques subventions
  use_lieux_connus: true        # Mapping manuel des lieux connus
