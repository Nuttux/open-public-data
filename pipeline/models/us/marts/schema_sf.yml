version: 2

models:
  - name: mart_us_sf_budget_by_year
    description: >
      SF net adopted budget per fiscal year × side (Revenue | Spending),
      FY2010-FY2027, with per-resident scaling (2020-2025 Census years)
      and DataSF provenance. Revenue = Spending per FY within $10 (tested).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']
      - name: total_usd
        tests: [not_null]
      - name: source_url
        tests: [not_null]
      - name: source_rows_updated_at
        tests: [not_null]

  - name: mart_us_sf_top_payees
    description: >
      Top 100 voucher payees per fiscal year (FY2007-FY2027) with amounts,
      non-profit flag, share of FY total, top-3 objects, grant-funded $
      (FY2018+) and the manual bucket classification (fiscal agents/banks
      dominate the naive ranking — API-RECON §A.3). The binding
      default-view guards live in
      tests/us/assert_us_sf_payee_default_top10_clean.sql.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, vendor]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: rank_in_fy
        tests: [not_null]
      - name: vendor
        tests: [not_null]
      - name: vouchers_paid_usd
        tests: [not_null]
      - name: execution_status
        tests:
          - not_null
          - accepted_values:
              values: ['closed', 'recently_closed_preliminary', 'in_progress']
      - name: is_aggregation_line
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payees_by_fy
    description: >
      Per-fiscal-year context for /us/city/sf/who-gets-paid — totals with
      the city vs related-government-units perimeter split (never netted
      silently), per-FY bucket-classification coverage, nonprofit slice
      (FY2018+ only — flag empty before), grant-funded lens (FY2018+ only)
      and execution_status. One row per FY.
    columns:
      - name: fiscal_year
        tests: [not_null, unique]
      - name: total_usd
        tests: [not_null]
      - name: city_usd
        tests: [not_null]
      - name: related_govt_units_usd
        tests: [not_null]
      - name: bucket_coverage_pct
        tests: [not_null]
      - name: execution_status
        tests:
          - not_null
          - accepted_values:
              values: ['closed', 'recently_closed_preliminary', 'in_progress']
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_top_nonprofits
    description: >
      Top 30 nonprofit-flagged payees per fiscal year, FY2018+ ONLY (the
      non_profit_indicator is empty before FY2018 — measured). Carries the
      community-ranking exclusion: healthcare-premium and
      intergovernmental buckets are flagged out of community_rank and
      rendered by the UI in a labeled note instead.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, vendor]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: vendor
        tests: [not_null]
      - name: vouchers_paid_usd
        tests: [not_null]
      - name: in_community_ranking
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payees_search
    description: >
      Lazy search index for the who-gets-paid page — one row per vendor in
      the union of per-FY top-1,000 payees (measured 4,068 vendors,
      ≈95-97% of every FY's dollars), with full per-FY series, all-time
      top department and bucket. Paris beneficiaires_search.json pattern.
    columns:
      - name: vendor
        tests: [not_null, unique]
      - name: total_usd
        tests: [not_null]
      - name: last_fy
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payee_materiality
    description: >
      Curated "what a payment buys" lines with amounts computed from the
      voucher data (seed picks the lines, BigQuery computes the dollars —
      zero-hardcode). Every seed pick must match:
      tests/us/assert_us_sf_materiality_rows_match.sql.
    columns:
      - name: slug
        tests: [not_null, unique]
      - name: label
        tests: [not_null]
      - name: amount_usd
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_comp_by_year
    description: >
      SF employee compensation aggregates per FISCAL year (year_type =
      'Fiscal' only — the Calendar/Fiscal filter lives here, not in core),
      2013-2025: salary/benefit component totals, distinct-employee
      headcount, per-employee mean and EXACT median, the
      overtime-exceeds-salary counters ($1k floor documented in
      int_us_sf_comp_employee_year), and per-resident scaling on Census
      years (2020-2025).
    columns:
      - name: fiscal_year
        tests: [not_null, unique]
      - name: year_type
        tests:
          - not_null
          - accepted_values:
              values: ['Fiscal']
      - name: total_compensation_usd
        tests: [not_null]
      - name: n_employees
        tests: [not_null]
      - name: median_total_comp_usd
        tests: [not_null]
      - name: n_ot_exceeds_salary_floored
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payroll_by_dept_year
    description: >
      SF payroll by department × fiscal year, 2013-2025 — PUBLISHED rows
      only (dial B: department-years under 5 distinct employees fold into
      citywide totals; the fold is asserted ≤ 4 employees/yr by
      assert_us_sf_payroll_dept_totals_match_by_year). KEYED ON
      department_code with canonical latest labels — labels break at
      FY2017 (block study §5).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, department_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: year_type
        tests:
          - not_null
          - accepted_values:
              values: ['Fiscal']
      - name: department_code
        tests: [not_null]
      - name: department
        tests: [not_null]
      - name: organization_group
        tests: [not_null]
      - name: total_compensation_usd
        tests: [not_null]
      - name: n_employees
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payroll_by_family_year
    description: >
      SF payroll drill grain — department × job family × fiscal year with
      the dial-B small-cell rule applied in the mart: every row covers
      ≥ 5 distinct employees; sub-threshold cells pool into a visible
      per-department "Other roles" row; pools under 5 fold into the
      department total with no row
      (assert_us_sf_payroll_family_cells_reconcile). Junk families
      reclassified + 16 display families from the two in-session seeds.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, department_code, family_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: department_code
        tests: [not_null]
      - name: family_code
        tests: [not_null]
      - name: family_label
        tests: [not_null]
      - name: display_family
        tests:
          - not_null
          - accepted_values:
              values:
                - Health & Hospitals
                - Police
                - Fire
                - Justice & Corrections
                - Security, Dispatch & Protection
                - Transit Operations
                - Trades & Maintenance
                - Engineering & Inspection
                - Social & Community Services
                - Administration & Finance
                - Management & Officials
                - Information Technology
                - Culture, Parks & Libraries
                - Airport & Port Operations
                - Custodial, Food & Service Aides
                - Other & Unassigned
                - Other roles
      - name: n_employees
        tests: [not_null]
      - name: total_compensation_usd
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payroll_distribution
    description: >
      SF payroll distribution per fiscal year (citywide, person grain):
      EXACT percentiles p25-p99 (p10 deliberately not published —
      part-timer pollution), threshold counts, and a $25k-bucket histogram
      0-500k as an ARRAY column (sparse top-tail buckets merged at export
      time). Σ histogram + n_at_or_above_500k = n_employees is tested.
    columns:
      - name: fiscal_year
        tests: [not_null, unique]
      - name: n_employees
        tests: [not_null]
      - name: p25_usd
        tests: [not_null]
      - name: p50_usd
        tests: [not_null]
      - name: p99_usd
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payroll_high_earner_titles
    description: >
      Composition of the >$400k-total-comp group in the latest fiscal
      year, by primary job title — COUNT-ONLY (no dollar columns), titles
      with n ≥ 5 plus one remainder row. Exists so the page's
      public-safety/physician framing of high earners is pipeline data,
      not prose.
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: threshold_usd
        tests: [not_null]
      - name: job_title
        tests: [not_null]
      - name: n_employees
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_payroll_ot_titles
    description: >
      Top 10 job titles by overtime dollars in the latest fiscal year,
      filtered to titles with ≥ 100 employees citywide (title-level detail
      is safe at that size; a smaller title drops off the list rather than
      shipping a small cell).
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: job_code
        tests: [not_null, unique]
      - name: job_title
        tests: [not_null]
      - name: n_employees
        tests: [not_null]
      - name: overtime_usd
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_budget_vs_actual
    description: >
      Measured budget-vs-actual reconciliation per fiscal year × side:
      candidate perimeters (net, excl. related govt units, excl. transfer
      characters) and their residuals. This table is the evidence base for
      whether/what to export as a comparison — see the model header and
      export_us_sf.py notes.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']

  - name: mart_us_sf_contracts_summary
    description: >
      SF supplier-contract register at CONTRACT grain (prime-dedupe over
      core_us_sf_contracts: money summed over prime rows only, netting the
      ~40 multi-prime amendment pairs; 75 sub-only contracts excluded).
      Money columns are agreed_usd, paid_usd (source pmt_amt = lifetime
      voucher payments) and derived remaining_calc_usd = GREATEST(agreed −
      paid, 0). consumed/remaining source columns never surface here
      (tests/us/assert_us_sf_contract_marts_no_consumed_remaining.sql);
      totals are grain-tested against core
      (tests/us/assert_us_sf_contracts_summary_grain.sql).
    columns:
      - name: contract_no
        tests: [not_null, unique]
      - name: agreed_usd
        tests: [not_null]
      - name: paid_usd
        tests: [not_null]
      - name: remaining_calc_usd
        tests: [not_null]
      - name: authority_family
        tests:
          - not_null
          - accepted_values:
              values:
                - competitive_bid
                - sole_source_waiver
                - emergency
                - grant
                - government_agreement
                - rent_real_estate
                - legacy_none
                - other
      - name: is_sole_source
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_contract_spend_by_fy
    description: >
      Per-contract spend curves — vouchers paid per contract × fiscal year
      (voucher join on contract_number: 97.3% of numbers, 99.1% of joined
      dollars; coverage starts FY2018, the PeopleSoft break). Register
      money stays in mart_us_sf_contracts_summary; this table only feeds
      fiche curves and the FY-activity context.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [contract_no, fiscal_year]
    columns:
      - name: contract_no
        tests: [not_null]
      - name: fiscal_year
        tests: [not_null]
      - name: vouchers_paid_usd
        tests: [not_null]
      - name: execution_status
        tests:
          - not_null
          - accepted_values:
              values: [closed, recently_closed_preliminary, in_progress]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_contract_team
    description: >
      Project-team members per contract (prime / subcontractor / joint
      venture constituent) with LBE status and attached amounts. NEVER
      unioned into contract money — attached_usd lives inside the prime's
      envelope and reconciles imperfectly in the source (sub totals exceed
      prime agreed on 486 contracts). Feeds fiche team tabs and the LBE
      participation aggregates as their own labeled perimeter.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [contract_no, supplier, role, is_lbe]
    columns:
      - name: contract_no
        tests: [not_null]
      - name: role
        tests:
          - not_null
          - accepted_values:
              values: ['Prime Contractor', 'Subcontractor', 'Joint Venture Constituent']
      - name: is_lbe
        tests: [not_null]
      - name: source_url
        tests: [not_null]
