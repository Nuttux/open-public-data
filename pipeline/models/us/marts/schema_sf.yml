version: 2

models:
  - name: mart_us_sf_budget_by_year
    description: >
      SF net adopted budget per fiscal year × side (Revenue | Spending),
      FY2010-FY2027, with per-resident scaling (2020-2025 Census years)
      and DataSF provenance. Revenue = Spending per FY within $10 (tested).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']
      - name: total_usd
        tests: [not_null]
      - name: source_url
        tests: [not_null]
      - name: source_rows_updated_at
        tests: [not_null]

  - name: mart_us_sf_top_payees
    description: >
      Top 100 voucher payees per fiscal year (FY2007-FY2027) with amounts,
      non-profit flag, share of FY total and the manual bucket
      classification for the FY2025 top payees (fiscal agents/banks
      dominate the naive ranking — API-RECON §A.3).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, vendor]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: rank_in_fy
        tests: [not_null]
      - name: vendor
        tests: [not_null]
      - name: vouchers_paid_usd
        tests: [not_null]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_comp_by_year
    description: >
      SF employee compensation aggregates per FISCAL year (year_type =
      'Fiscal' only — the Calendar/Fiscal filter lives here, not in core),
      2013-2025: salary/benefit component totals, distinct-employee
      headcount, per-employee mean/median.
    columns:
      - name: fiscal_year
        tests: [not_null, unique]
      - name: year_type
        tests:
          - not_null
          - accepted_values:
              values: ['Fiscal']
      - name: total_compensation_usd
        tests: [not_null]
      - name: n_employees
        tests: [not_null]

  - name: mart_us_sf_budget_vs_actual
    description: >
      Measured budget-vs-actual reconciliation per fiscal year × side:
      candidate perimeters (net, excl. related govt units, excl. transfer
      characters) and their residuals. This table is the evidence base for
      whether/what to export as a comparison — see the model header and
      export_us_sf.py notes.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']

  # ── Block 1 — /us/city/sf/budget breakdown marts ──────────────────────────

  - name: mart_us_sf_budget_org_group
    description: >
      Net adopted budget per fiscal year × side × organization group (7
      groups — the only dimension stable across the FY2018 break; all
      fiscal years). Feeds the org-group treemap.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side, organization_group_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']
      - name: organization_group_code
        tests: [not_null]
      - name: total_usd
        tests: [not_null]
      - name: execution_status
        tests:
          - not_null
          - accepted_values:
              values: [closed, recently_closed_preliminary, in_progress, adopted_only]
      - name: source_url
        tests: [not_null]

  - name: mart_us_sf_budget_dept
    description: >
      Net adopted budget per fiscal year × side × department, with the
      per-department transfer-adjustment netting exposed and seed display
      names (modern era). FY2018 excluded — corrupted-drill year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side, department_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']
      - name: department_code
        tests: [not_null]
      - name: total_usd
        tests: [not_null]
      - name: execution_status
        tests:
          - not_null
          - accepted_values:
              values: [closed, recently_closed_preliminary, in_progress, adopted_only]

  - name: mart_us_sf_budget_dept_character
    description: >
      Adopted budget dept × character cells (the fiche altitude, ~460
      spending + ~330 revenue nonzero cells per modern FY) with character
      glosses. Transfer-adjustment cells kept and flagged. FY2018 excluded.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side, department_code, character_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']
      - name: amount_usd
        tests: [not_null]
      - name: is_transfer_adjustment
        tests: [not_null]

  - name: mart_us_sf_budget_character
    description: >
      Net adopted budget per fiscal year × side × character (the economic
      altitude) with glosses and display_category driving UI placement.
      FY2018 excluded.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side, character_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']
      - name: total_usd
        tests: [not_null]
      - name: display_category
        tests:
          - accepted_values:
              values: [standard, internal, adjustment, offset]

  - name: mart_us_sf_budget_program
    description: >
      Adopted budget per fiscal year × side × program. Programs are a strip,
      not a drill level: ~10 generic activity tags from FY2019
      (n_programs_in_fy lets the export decide renderability). FY2018
      excluded.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side, program_code, program]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: total_usd
        tests: [not_null]

  - name: mart_us_sf_budget_fund
    description: >
      Adopted budget per fiscal year × side × fund type × fund category —
      the perimeter block (Operating vs Continuing Projects vs Grants).
      All fiscal years (FY2018 uses the legacy fund taxonomy, internally
      consistent).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side, fund_type_code, fund_category_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: total_usd
        tests: [not_null]

  - name: mart_us_sf_budget_vs_actual_dept
    description: >
      Department-level budget vs actual on the measured honest perimeter
      (Operating funds, no related govt units, no transfer characters),
      CLOSED fiscal years FY2019+ only, with GEN/PUC structural-outlier
      annotations from the seed. Sums back to the citywide operating pair
      exactly (tested).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [fiscal_year, side, department_code]
    columns:
      - name: fiscal_year
        tests: [not_null]
      - name: side
        tests:
          - not_null
          - accepted_values:
              values: ['Revenue', 'Spending']
      - name: department_code
        tests: [not_null]
      - name: is_comparable
        tests: [not_null]
      - name: is_structural_outlier
        tests: [not_null]
      - name: execution_status
        tests:
          - not_null
          - accepted_values:
              values: [closed]
