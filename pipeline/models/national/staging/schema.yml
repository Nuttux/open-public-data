version: 2

models:
  - name: stg_dgfip_balances
    description: "Balances comptables DGFiP nettoyées (budget principal cbudg=1, M14+M57) - 1 ligne = 1 compte par commune/année. Dim commune jointe depuis OFGL par SIREN (ungated)."
    columns:
      - name: code_insee
        tests: [not_null]
      - name: annee
        tests: [not_null]
      - name: compte
        tests: [not_null]

  - name: stg_ofgl_communes
    description: "OFGL base-communes-consolidée (LONG) - univers commune + agrégats de réconciliation (montant_bp). 1 ligne = commune × année × agrégat."
    columns:
      - name: code_insee
        tests: [not_null]
      - name: annee
        tests: [not_null]

  - name: stg_decp_marches
    description: "DECP marchés publics nettoyés - 1 ligne = 1 marché notifié"
    columns:
      - name: commune_slug
        tests: [not_null]
      - name: marche_id
        tests: [not_null]

  - name: stg_subventions_nat
    description: "Subventions nationales SCDL nettoyées - 1 ligne = 1 subvention > 23k€"
    columns:
      - name: commune_slug
        tests: [not_null]
