# =============================================================================
# Schema: Core Layer (OBT - One Big Table)
#
# Tables dénormalisées prêtes pour analyse et export
# =============================================================================

version: 2

models:
  # ===========================================================================
  # BUDGET PRINCIPAL
  # ===========================================================================
  - name: core_budget
    meta:
      domain: "budget"
      criticality: "high"
      freshness_slo: "annual (CA published ~Jun N+1)"
    description: |
      Budget principal Ville de Paris (OBT).
      Source de vérité pour les totaux macro.

      Grain: (annee, section, chapitre_code, nature_code, fonction_code, sens_flux)

      Enrichissements:
      - ode_thematique: thématique dashboard (mapping chapitre/fonction)
      - ode_categorie_flux: catégorie comptable (Personnel, Subventions, etc.)
    config:
      materialized: table
    columns:
      - name: annee
        description: "Année fiscale (2019-2024)"
        tests:
          - not_null
      - name: section
        description: "Investissement ou Fonctionnement"
        tests:
          - not_null
          - accepted_values:
              values: ['Investissement', 'Fonctionnement']
      - name: sens_flux
        description: "Dépense ou Recette"
        tests:
          - accepted_values:
              values: ['Dépense', 'Recette']
      - name: montant
        description: "Montant mandaté/titré (€)"
        tests:
          - not_null
      - name: ode_thematique
        description: "Thématique dashboard (Administration, Éducation, etc.)"
        tests:
          - not_null
      - name: ode_categorie_flux
        description: "Catégorie comptable (Personnel, Subventions, etc.)"
        tests:
          - not_null
      - name: cle_technique
        description: "Clé technique unique"
        tests:
          - unique
          - not_null

  # ===========================================================================
  # BUDGET VOTÉ (prévisionnel) - Entité séparée du CA
  # ===========================================================================
  - name: core_budget_vote
    meta:
      domain: "budget"
      criticality: "high"
      freshness_slo: "annual (BP published Dec N-1)"
    description: |
      Budget voté de la Ville de Paris (OBT) - Budget Primitif.
      Entité SÉPARÉE de core_budget (exécuté).

      Grain: (annee, section, chapitre_code, nature_code, fonction_code, sens_flux)

      Enrichissements (même logique que core_budget):
      - ode_thematique: thématique dashboard (mapping chapitre/fonction)
      - ode_categorie_flux: catégorie comptable (Personnel, Subventions, etc.)

      ARCHITECTURE:
      - core_budget = CA (exécuté) = source de vérité = 2019-2024
      - core_budget_vote = BV (prévisionnel) = 2019-2026
      - mart_vote_vs_execute = JOIN des deux
    config:
      materialized: table
    columns:
      - name: annee
        description: "Année fiscale (2019-2026)"
        tests:
          - not_null
      - name: section
        description: "Investissement ou Fonctionnement"
        tests:
          - not_null
          - accepted_values:
              values: ['Investissement', 'Fonctionnement']
      - name: sens_flux
        description: "Dépense ou Recette"
        tests:
          - accepted_values:
              values: ['Dépense', 'Recette']
      - name: montant
        description: "Crédits votés (€) - montant PRÉVISIONNEL"
        tests:
          - not_null
      - name: ode_thematique
        description: "Thématique dashboard (Administration, Éducation, etc.)"
        tests:
          - not_null
      - name: ode_categorie_flux
        description: "Catégorie comptable (Personnel, Subventions, etc.)"
      - name: cle_technique
        description: "Clé technique unique (suffixe -BV)"
        tests:
          - unique
          - not_null

  # ===========================================================================
  # SUBVENTIONS
  # ===========================================================================
  - name: core_subventions
    meta:
      domain: "subventions"
      criticality: "high"
      freshness_slo: "monthly (delib chain) + annual (annexe CA)"
    description: |
      Subventions aux associations et autres bénéficiaires (OBT).

      Grain: (cle_technique) ou (annee, beneficiaire_normalise, collectivite)

      Enrichissements:
      - siret: 14 chars (association ou API recherche)
      - direction: direction municipale responsable
      - ode_thematique: classification (pattern/direction/llm/default)
      - ode_arrondissement, ode_latitude/longitude: géolocalisation via SIRET
    config:
      materialized: table
    columns:
      - name: annee
        description: "Année fiscale"
        tests:
          - not_null
      - name: beneficiaire_normalise
        description: "Nom bénéficiaire normalisé"
      - name: montant
        description: "Montant de la subvention (€)"
        tests:
          - not_null
      - name: siret
        description: "SIRET 14 chars si disponible"
      - name: ode_thematique
        description: "Thématique classifiée"
        tests:
          - not_null
      - name: ode_arrondissement
        description: "Arrondissement (1-20) si géolocalisé"

  # ===========================================================================
  # AP PROJETS
  # ===========================================================================
  - name: core_ap_projets
    meta:
      domain: "investissements"
      criticality: "high"
      freshness_slo: "annual (PDF Annexe IL ~Jun N+1)"
    description: |
      Projets d'investissement (Autorisations de Programme) (OBT).

      Grain: (annee, ap_code)

      Enrichissements:
      - ode_arrondissement: arrondissement (regex/lieu_connu/llm)
      - ode_type_equipement: type d'équipement (piscine, école, etc.)
      - ode_adresse, ode_latitude/longitude: géolocalisation
      - ode_confiance: score de confiance (1.0 pour regex/lieu, variable pour llm)
    config:
      materialized: table
    columns:
      - name: annee
        description: "Année fiscale"
        tests:
          - not_null
      - name: ap_code
        description: "Code AP unique"
        tests:
          - not_null
      - name: montant
        description: "Montant mandaté (€)"
        tests:
          - not_null
      - name: ode_arrondissement
        description: "Arrondissement (1-20) si localisé"
      - name: ode_type_equipement
        description: "Type d'équipement (piscine, equipement_sportif, etc.)"

  # ===========================================================================
  # LOGEMENTS SOCIAUX
  # ===========================================================================
  - name: core_logements_sociaux
    meta:
      domain: "logement"
      criticality: "medium"
      freshness_slo: "annual"
    description: |
      Programmes de logements sociaux financés (OBT).
      Déjà géolocalisés dans la source (geo_point_2d).

      Grain: (id_livraison)
    config:
      materialized: table
    columns:
      - name: id_livraison
        description: "Identifiant unique programme"
        tests:
          - not_null
      - name: annee
        description: "Année de livraison"
      - name: arrondissement
        description: "Arrondissement (1-20)"
      - name: latitude
        description: "Latitude GPS"
        tests:
          - not_null
      - name: longitude
        description: "Longitude GPS"
        tests:
          - not_null
      - name: nb_logements
        description: "Nombre total de logements"

  # ===========================================================================
  # MARCHÉS PUBLICS (fusion opendata.paris.fr + DECP national)
  # ===========================================================================
  - name: core_marches_publics
    meta:
      domain: "marches"
      criticality: "high"
      freshness_slo: "monthly (DECP refresh)"
    description: |
      Marchés publics consolidés = opendata.paris.fr LEFT JOIN DECP national
      + UNION des marchés DECP-exclusifs.

      Deux chiffres distincts :
        - montant_max = plafond contractuel (source Paris)
        - decp_montant_notifie = montant déclaré à la signature (source DECP)
      Voir afficher_deux_montants pour le seuil d'écart (5%).

      Dédup DECP multi-titulaires par (objet, montant, date_notification)
      pour éviter le sur-comptage des accords-cadres.

      Grain: (annee, numero_marche)
    config:
      materialized: table
    columns:
      - name: numero_marche
        description: "Numéro du marché (14 chars Paris ou reconstruit depuis DECP)"
        tests:
          - unique
          - not_null
      - name: annee
        description: "Année de notification"
        tests:
          - not_null
      - name: montant_max
        description: "Plafond contractuel (ENVELOPPE pluriannuelle)"
        tests:
          - not_null
      - name: _source_origin
        description: "Origine de la ligne: 'paris' ou 'decp'"
        tests:
          - not_null
          - accepted_values:
              values: ['paris', 'decp']
      - name: cle_technique
        description: "Clé technique unique"
        tests:
          - unique
          - not_null

  # ===========================================================================
  # NOUVEAUX CORE (Phases 1-18)
  # ===========================================================================

  - name: core_dette_garantie
    meta:
      domain: "bilan"
      criticality: "low"
      freshness_slo: "annual"
    description: |
      Emprunts garantis Paris (engagements hors bilan).
      Source: stg_dette_garantie. Filtre: capital_restant > 0.
      Enrichissements: bucket_nature, arrondissement (regex sur objet), is_taux_fixe.
    columns:
      - name: annee
        tests: [not_null]
      - name: beneficiaire
        tests: [not_null]
      - name: capital_restant
        description: "Capital restant dû (€)"
        tests: [not_null]
      - name: bucket_nature
        tests:
          - not_null
          - accepted_values:
              values: ['logement_social_aide', 'logement_hors_aide', 'autres_operations']
      - name: is_taux_fixe
        tests: [not_null]

  - name: core_sirene_companies
    description: "Cache SIRENE — passthrough de stg pour respect du layering."
    columns:
      - name: siren
        tests:
          - not_null
          - unique

  - name: core_pdf_investissements_localises
    description: "Investissements localisés extraits PDF Annexe IL."
    columns:
      - name: annee_publication
        tests: [not_null]
      - name: projet_id
        tests: [not_null]
      - name: montant
        tests: [not_null]

  - name: core_deliberations
    meta:
      domain: "subventions"
      criticality: "medium"
      freshness_slo: "per Conseil de Paris session (~6/year)"
    description: |
      OBT articles × delibs × sessions du Conseil de Paris.
      Grain: une ligne par article (subvention individuelle).
      Dédup interne sur (session_id, delib_id) côté delibs.
    columns:
      - name: session_id
        tests: [not_null]
      - name: delib_id
        tests: [not_null]

  - name: core_enrichment_caches
    description: |
      Caches d'enrichissement (passthrough polymorphe). À éclater par cache type
      (Issue #3 du backlog) — l'absence de typage est connue.
    columns:
      - name: relative_path
        tests:
          - not_null
          - unique

  - name: core_bilan_comptable
    meta:
      domain: "bilan"
      criticality: "medium"
      freshness_slo: "annual"
    description: "Bilan comptable Paris (actif/passif annuel). Grain: annee × type_bilan × poste × detail."
    columns:
      - name: annee
        tests: [not_null]
      - name: type_bilan
        tests:
          - not_null
          - accepted_values:
              values: ['Actif', 'Passif']
      - name: poste
        tests: [not_null]

  - name: core_logement_attente_arr
    meta:
      domain: "logement"
      criticality: "medium"
      freshness_slo: "annual (DRIHL XLSX)"
    description: "Tension SLS par arrondissement (DRIHL 2024). Grain: code_insee × annee."
    columns:
      - name: code_insee
        tests: [not_null]
      - name: annee
        tests: [not_null]
